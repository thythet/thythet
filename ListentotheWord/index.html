<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ស្ដាប់ព្រះបន្ទូល</title>

  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Kantumruy Pro', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(89,166,255,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 25%),
        #0f0f0f;
      color: #f3f3f3;
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 100px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.1rem;
      font-weight: 700;
      line-height: 1.5;
    }

    .subtext {
      color: #c8c8c8;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 15px;
      font-weight: 400;
    }

    .home-latest-wrap {
      margin-top: 34px;
      text-align: left;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .latest-tracks {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .home-track-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      transition: 0.25s ease;
      cursor: pointer;
    }

    .home-track-card:hover {
      background: rgba(89,166,255,0.16);
    }

    .home-track-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .home-track-meta {
      min-width: 0;
      flex: 1;
    }

    .home-track-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .home-track-subtitle {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      color: #d4d4d4;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .home-track-date {
      font-size: 12px;
      font-weight: 300;
      line-height: 1.5;
      color: #ababab;
    }

    .home-track-play {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .glass-more-btn {
      margin-top: 16px;
      width: 100%;
      padding: 13px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #fff;
      border-radius: 16px;
      cursor: pointer;
      font-family: 'Kantumruy Pro', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: 0.25s ease;
    }

    .glass-more-btn:hover {
      background: rgba(89,166,255,0.18);
    }

    #podcastToolBtn {
      position: fixed;
      right: 30px;
      bottom: 30px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.28);
      z-index: 9999;
      transition: 0.25s ease;
      user-select: none;
    }

    #podcastToolBtn:hover {
      transform: translateY(-2px);
      background: rgba(89,166,255,0.22);
    }

    /* popup align to right */
    #podcastTool {
      position: fixed;
      right: 24px;
      top: 24px;
      width: 460px;
      max-width: calc(100vw - 32px);
      height: calc(100vh - 48px);
      max-height: 820px;
      display: none;
      flex-direction: column;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border-radius: 22px;
      overflow: hidden;
      z-index: 10000;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      font-family: 'Kantumruy Pro', sans-serif;
      left: auto;
      transform: none;
    }

    #podcastTool .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      cursor: grab;
      user-select: none;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #podcastTool .header:active {
      cursor: grabbing;
    }

    #podcastTool .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1.5;
    }

    #podcastTool .header-buttons {
      display: flex;
      gap: 8px;
    }

    #podcastTool .header-buttons button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.25s ease;
      font-family: 'Kantumruy Pro', sans-serif;
    }

    #podcastTool .header-buttons button:hover {
      background: rgba(89,166,255,0.22);
    }

    #podcastTool .content {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      min-height: 0;
      flex: 1;
    }

    #podcastSearch {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 14px;
      font-family: 'Kantumruy Pro', sans-serif;
      font-weight: 400;
    }

    #podcastSearch::placeholder {
      color: #bcbcbc;
    }

    #nowPlayingCard {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      align-items: center;
    }

    #nowPlayingThumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    #nowPlayingMeta {
      min-width: 0;
      flex: 1;
      text-align: left;
    }

    #nowPlayingLabel {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b6b6b6;
      margin-bottom: 6px;
      font-weight: 500;
      line-height: 1.5;
    }

    #nowPlayingTitle {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    #nowPlayingSubtitle {
      font-size: 13px;
      font-weight: 500;
      color: #d5d5d5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    #nowPlayingExtra {
      font-size: 12px;
      font-weight: 300;
      color: #a8a8a8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }

    #glassPlayer {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
    }

    #playerControls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .player-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      transition: 0.25s ease;
    }

    .player-btn:hover {
      background: rgba(89,166,255,0.24);
    }

    .player-btn.active {
      background: rgba(89,166,255,0.24);
      color: #9fd0ff;
      border-color: rgba(89,166,255,0.45);
    }

    #waveformWrap {
      position: relative;
      width: 100%;
      height: 64px;
      margin-top: 10px;
      overflow: hidden;
      cursor: pointer;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 6px;
    }

    #waveformBars {
      height: 100%;
      display: flex;
      align-items: end;
      gap: 2px;
    }

    .wave-bar {
      flex: 1 1 auto;
      min-width: 2px;
      border-radius: 2px 2px 0 0;
      background: rgba(255,255,255,0.38);
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    .wave-bar.played {
      background: #ff8a5b;
    }

    .wave-bar.current {
      background: #ffffff;
    }

    #waveformTime {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #d0d0d0;
      margin-top: 8px;
      font-weight: 400;
      line-height: 1.5;
    }

    #playerStatus {
      text-align: center;
      font-size: 12px;
      color: #bdbdbd;
      min-height: 16px;
      margin-top: 8px;
      font-weight: 400;
      line-height: 1.5;
    }

    #playlistBox {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #playlistBox::-webkit-scrollbar {
      width: 6px;
    }

    #playlistBox::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    #playlistBox::-webkit-scrollbar-track {
      background: transparent;
    }

    .track-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      cursor: pointer;
      transition: 0.25s ease;
      align-items: center;
    }

    .track-card:hover {
      background: rgba(89,166,255,0.15);
    }

    .track-card.active {
      background: rgba(89,166,255,0.24);
      border-color: rgba(89,166,255,0.35);
    }

    .track-thumb {
      width: 66px;
      height: 66px;
      object-fit: cover;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .track-meta {
      min-width: 0;
      flex: 1;
    }

    .track-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }

    .track-preacher {
      font-size: 13px;
      font-weight: 500;
      color: #d8d8d8;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }

    .track-subtitle {
      font-size: 12px;
      font-weight: 500;
      color: #b6b6b6;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }

    .track-date {
      font-size: 12px;
      font-weight: 300;
      color: #9c9c9c;
      line-height: 1.5;
    }

    .track-play {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .empty-text {
      text-align: center;
      color: #bdbdbd;
      padding: 20px 8px;
      line-height: 1.7;
      font-size: 14px;
      font-weight: 400;
    }

    audio {
      display: none;
    }

    @media (max-width: 520px) {
      #podcastTool {
        right: 8px;
        top: 8px;
        width: calc(100vw - 16px);
        height: calc(100vh - 16px);
        border-radius: 18px;
        max-width: none;
      }

      #nowPlayingThumb {
        width: 64px;
        height: 64px;
      }

      .track-thumb {
        width: 58px;
        height: 58px;
      }

      .home-track-thumb {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>

  <div class="page-wrap">
    <h1><i class="ri-mic-line"></i> ព្រះបន្ទូលសប្ដាហ៍នេះ</h1>
    <p class="subtext">
      ព្រះបន្ទូលថ្ងៃអាទិត្យចុងក្រោយ សម្រាប់ការស្តាប់ឡើងវិញ ការអនុវត្តន៍តាមព្រះបន្ទូល និងការលូតលាស់ខាងវិញ្ញាណ។
    </p>

    <div class="home-latest-wrap">
      <div class="section-title">ព្រះបន្ទូលថ្មីៗ</div>
      <div id="latestTracks" class="latest-tracks"></div>

      <button id="showMoreTracksBtn" class="glass-more-btn">
        បង្ហាញបន្ថែម
      </button>
    </div>
  </div>

  <button id="podcastToolBtn" title="Open Podcast Playlist">
    <i class="ri-headphone-line"></i>
  </button>

  <div id="podcastTool">
    <div class="header" id="podcastHeader">
      <div class="header-title">
        <i class="ri-mic-line"></i>
        <span>ស្ដាប់ព្រះបន្ទូល</span>
      </div>
      <div class="header-buttons">
        <button id="refreshBtn" title="Reload playlist">
          <i class="ri-refresh-line"></i>
        </button>
        <button id="closeBtn" title="Close">
          <i class="ri-close-circle-line"></i>
        </button>
      </div>
    </div>

    <div class="content">
      <input id="podcastSearch" type="text" placeholder="ស្វែងរកចំណងជើង ឬឈ្មោះអ្នកអធិប្បាយ..." />

      <div id="nowPlayingCard">
        <img id="nowPlayingThumb" src="" alt="Thumbnail">
        <div id="nowPlayingMeta">
          <div id="nowPlayingLabel">NOW PLAYING</div>
          <div id="nowPlayingTitle">មិនទាន់មានសំឡេងកំពុងចាក់</div>
          <div id="nowPlayingSubtitle">សូមជ្រើសរើសព្រះបន្ទូលពីបញ្ជីខាងក្រោម</div>
          <div id="nowPlayingExtra">---</div>
        </div>
      </div>

      <audio id="audioPlayer" preload="metadata"></audio>

      <div id="glassPlayer">
        <div id="playerControls">
          <button class="player-btn" id="prevBtn" title="Previous">
            <i class="ri-skip-back-fill"></i>
          </button>
          <button class="player-btn" id="playPauseBtn" title="Play / Pause">
            <i class="ri-play-fill"></i>
          </button>
          <button class="player-btn" id="nextBtn" title="Next">
            <i class="ri-skip-forward-fill"></i>
          </button>
          <button class="player-btn" id="repeatBtn" title="Repeat">
            <i class="ri-repeat-line"></i>
          </button>
        </div>

        <div id="waveformWrap">
          <div id="waveformBars"></div>
        </div>

        <div id="waveformTime">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>

        <div id="playerStatus">កំពុងផ្ទុកបញ្ជីសំឡេង...</div>
      </div>

      <div id="playlistBox"></div>
    </div>
  </div>

  <script>
    const AUDIO_BASE = 'https://thythet.com/assets/audio/';
    const PLAYLIST_URL = AUDIO_BASE + 'playlist.json';

    const podcastToolBtn = document.getElementById('podcastToolBtn');
    const podcastTool = document.getElementById('podcastTool');
    const podcastHeader = document.getElementById('podcastHeader');
    const closeBtn = document.getElementById('closeBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const podcastSearch = document.getElementById('podcastSearch');

    const audioPlayer = document.getElementById('audioPlayer');
    const playlistBox = document.getElementById('playlistBox');
    const playerStatus = document.getElementById('playerStatus');

    const nowPlayingThumb = document.getElementById('nowPlayingThumb');
    const nowPlayingTitle = document.getElementById('nowPlayingTitle');
    const nowPlayingSubtitle = document.getElementById('nowPlayingSubtitle');
    const nowPlayingExtra = document.getElementById('nowPlayingExtra');

    const prevBtn = document.getElementById('prevBtn');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const nextBtn = document.getElementById('nextBtn');
    const repeatBtn = document.getElementById('repeatBtn');

    const currentTimeEl = document.getElementById('currentTime');
    const durationTimeEl = document.getElementById('durationTime');

    const latestTracks = document.getElementById('latestTracks');
    const showMoreTracksBtn = document.getElementById('showMoreTracksBtn');

    const waveformWrap = document.getElementById('waveformWrap');
    const waveformBars = document.getElementById('waveformBars');

    let playlist = [];
    let filteredPlaylist = [];
    let currentIndex = -1;
    let repeatMode = 0; // 0 off, 1 all, 2 one

    function getAudioUrl(file) {
      return AUDIO_BASE + file + '.mp3';
    }

    function getThumbUrl(file) {
      return AUDIO_BASE + file + '.jpg';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    function filenameToTitle(file) {
      return String(file || '')
        .replace(/\.[^/.]+$/, '')
        .replace(/[-_]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function safeTitle(item) {
      const title = (item.title || '').trim();
      if (title) return title;
      return filenameToTitle(item.file);
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'មិនមានកាលបរិច្ឆេទ';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ':' + String(secs).padStart(2, '0');
    }

    function getSafeDateValue(dateStr) {
      const d = new Date(dateStr);
      return isNaN(d.getTime()) ? 0 : d.getTime();
    }

    function getLatestThreeTracks() {
      return [...playlist]
        .sort((a, b) => getSafeDateValue(b.date) - getSafeDateValue(a.date))
        .slice(0, 3);
    }

    function renderLatestTracks() {
      if (!latestTracks) return;

      latestTracks.innerHTML = '';

      const latest = getLatestThreeTracks();

      if (!latest.length) {
        latestTracks.innerHTML = '<div class="empty-text">មិនទាន់មានព្រះបន្ទូលថ្មីៗទេ។</div>';
        return;
      }

      latest.forEach(item => {
        const realIndex = playlist.findIndex(p => p.file === item.file);

        const card = document.createElement('div');
        card.className = 'home-track-card';
        card.innerHTML = `
          <img class="home-track-thumb" src="${escapeHtml(item.thumb)}" alt="${escapeHtml(item.title)}"
               onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,${encodeURIComponent(`
                 <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">
                   <rect width="100%" height="100%" rx="18" fill="#1f1f1f"/>
                   <text x="50%" y="50%" fill="#9ecfff" font-size="18" text-anchor="middle" dominant-baseline="middle">AUDIO</text>
                 </svg>
               `)}'">
          <div class="home-track-meta">
            <div class="home-track-title">${escapeHtml(item.title)}</div>
            <div class="home-track-subtitle">${escapeHtml(item.preacher)} • ${escapeHtml(item.subtitle)}</div>
            <div class="home-track-date">${escapeHtml(formatDate(item.date))}</div>
          </div>
          <div class="home-track-play"><i class="ri-play-fill"></i></div>
        `;

        card.addEventListener('click', () => {
          playTrack(realIndex);
          togglePodcastTool(true);
        });

        latestTracks.appendChild(card);
      });
    }

    function updatePlayPauseIcon() {
      playPauseBtn.innerHTML = audioPlayer.paused
        ? '<i class="ri-play-fill"></i>'
        : '<i class="ri-pause-fill"></i>';
    }

    function updateRepeatIcon() {
      repeatBtn.classList.remove('active');

      if (repeatMode === 0) {
        repeatBtn.innerHTML = '<i class="ri-repeat-line"></i>';
        repeatBtn.title = 'Repeat off';
      } else if (repeatMode === 1) {
        repeatBtn.innerHTML = '<i class="ri-repeat-line"></i>';
        repeatBtn.title = 'Repeat all';
        repeatBtn.classList.add('active');
      } else {
        repeatBtn.innerHTML = '<i class="ri-repeat-one-line"></i>';
        repeatBtn.title = 'Repeat one';
        repeatBtn.classList.add('active');
      }
    }

    function hashString(str) {
      let hash = 0;
      const s = String(str || '');
      for (let i = 0; i < s.length; i++) {
        hash = ((hash << 5) - hash) + s.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function generateWaveformHeights(seedKey, count = 120) {
      const seed = hashString(seedKey);
      let heights = [];
      let value = seed % 9973;

      for (let i = 0; i < count; i++) {
        value = (value * 9301 + 49297) % 233280;
        const rand = value / 233280;

        const smoothBoost =
          0.55 +
          0.25 * Math.sin(i * 0.22) +
          0.12 * Math.sin(i * 0.51) +
          rand * 0.25;

        const height = Math.max(12, Math.min(92, Math.round(smoothBoost * 100)));
        heights.push(height);
      }

      return heights;
    }

    function buildWaveform(seedKey) {
      waveformBars.innerHTML = '';

      const heights = generateWaveformHeights(seedKey, 120);

      heights.forEach(h => {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        bar.style.height = h + '%';
        waveformBars.appendChild(bar);
      });

      updateWaveformProgress();
    }

    function updateWaveformProgress() {
      const bars = waveformBars.querySelectorAll('.wave-bar');
      const duration = audioPlayer.duration || 0;
      const current = audioPlayer.currentTime || 0;
      const percent = duration ? current / duration : 0;
      const activeCount = Math.floor(bars.length * percent);

      bars.forEach((bar, index) => {
        bar.classList.remove('played', 'current');

        if (index < activeCount) {
          bar.classList.add('played');
        } else if (index === activeCount && duration > 0) {
          bar.classList.add('current');
        }
      });
    }

    function updateProgress() {
      const duration = audioPlayer.duration || 0;
      const current = audioPlayer.currentTime || 0;

      currentTimeEl.textContent = formatTime(current);
      durationTimeEl.textContent = formatTime(duration);
      updateWaveformProgress();
    }

    function normalizeItem(raw) {
      const item = { ...raw };

      item.file = String(item.file || '').trim();
      item.title = safeTitle(item);
      item.preacher = String(item.preacher || '').trim() || 'មិនមានឈ្មោះអ្នកអធិប្បាយ';
      item.subtitle = String(item.subtitle || '').trim() || 'ព្រះបន្ទូលថ្ងៃអាទិត្យ';
      item.date = String(item.date || '').trim();

      item.audio = getAudioUrl(item.file);
      item.thumb = getThumbUrl(item.file);

      return item;
    }

    async function loadPlaylist() {
      playerStatus.textContent = 'កំពុងផ្ទុកបញ្ជីសំឡេង...';
      playlistBox.innerHTML = '<div class="empty-text">កំពុងផ្ទុកព្រះបន្ទូល...</div>';

      try {
        const res = await fetch(PLAYLIST_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load playlist.json');

        const data = await res.json();

        playlist = Array.isArray(data)
          ? data.filter(item => item && item.file).map(normalizeItem)
          : [];

        filteredPlaylist = [...playlist];
        renderPlaylist();
        renderLatestTracks();

        playerStatus.textContent = playlist.length
          ? 'បានផ្ទុក ' + playlist.length + ' ឯកសារសំឡេង'
          : 'មិនមានឯកសារសំឡេង';

      } catch (err) {
        console.error(err);
        playlist = [];
        filteredPlaylist = [];
        renderPlaylist();
        renderLatestTracks();
        playerStatus.textContent = 'មិនអាចផ្ទុក playlist បានទេ';
      }
    }

    function renderPlaylist() {
      playlistBox.innerHTML = '';

      if (!filteredPlaylist.length) {
        playlistBox.innerHTML = '<div class="empty-text">មិនមានលទ្ធផលដែលត្រូវគ្នាទេ។</div>';
        return;
      }

      filteredPlaylist.forEach(item => {
        const realIndex = playlist.findIndex(p => p.file === item.file);

        const isActive = currentIndex >= 0 &&
          playlist[currentIndex] &&
          playlist[currentIndex].file === item.file;

        const card = document.createElement('div');
        card.className = 'track-card' + (isActive ? ' active' : '');
        card.innerHTML = `
          <img class="track-thumb" src="${escapeHtml(item.thumb)}" alt="${escapeHtml(item.title)}"
               onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,${encodeURIComponent(`
                 <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">
                   <rect width="100%" height="100%" rx="18" fill="#1f1f1f"/>
                   <text x="50%" y="50%" fill="#9ecfff" font-size="18" text-anchor="middle" dominant-baseline="middle">AUDIO</text>
                 </svg>
               `)}'">
          <div class="track-meta">
            <div class="track-title">${escapeHtml(item.title)}</div>
            <div class="track-preacher">${escapeHtml(item.preacher)}</div>
            <div class="track-subtitle">${escapeHtml(item.subtitle)}</div>
            <div class="track-date">${escapeHtml(formatDate(item.date))}</div>
          </div>
          <div class="track-play"><i class="ri-play-circle-line"></i></div>
        `;

        card.addEventListener('click', () => playTrack(realIndex));
        playlistBox.appendChild(card);
      });
    }

    function updateNowPlaying(item) {
      if (!item) {
        nowPlayingThumb.src = '';
        nowPlayingTitle.textContent = 'មិនទាន់មានសំឡេងកំពុងចាក់';
        nowPlayingSubtitle.textContent = 'សូមជ្រើសរើសព្រះបន្ទូលពីបញ្ជីខាងក្រោម';
        nowPlayingExtra.textContent = '---';
        return;
      }

      nowPlayingThumb.src = item.thumb;
      nowPlayingThumb.onerror = function () {
        this.onerror = null;
        this.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">
            <rect width="100%" height="100%" rx="18" fill="#1f1f1f"/>
            <text x="50%" y="50%" fill="#9ecfff" font-size="18" text-anchor="middle" dominant-baseline="middle">AUDIO</text>
          </svg>
        `);
      };

      nowPlayingTitle.textContent = item.title;
      nowPlayingSubtitle.textContent = item.subtitle;
      nowPlayingExtra.textContent = item.preacher + ' • ' + formatDate(item.date);
    }

    function playTrack(index) {
      const item = playlist[index];
      if (!item) return;

      currentIndex = index;
      audioPlayer.src = item.audio;
      audioPlayer.load();

      updateNowPlaying(item);
      renderPlaylist();
      playerStatus.textContent = 'កំពុងផ្ទុក...';

      buildWaveform(item.file || item.title || 'track');

      audioPlayer.play()
        .then(() => {
          playerStatus.textContent = 'កំពុងចាក់';
          updatePlayPauseIcon();
        })
        .catch(err => {
          console.error(err);
          playerStatus.textContent = 'មិនអាចចាក់សំឡេងបានទេ';
          updatePlayPauseIcon();
        });
    }

    function playNext() {
      if (!playlist.length) return;

      if (currentIndex < playlist.length - 1) {
        playTrack(currentIndex + 1);
      } else if (repeatMode === 1) {
        playTrack(0);
      }
    }

    function playPrev() {
      if (!playlist.length) return;

      if (currentIndex > 0) {
        playTrack(currentIndex - 1);
      } else if (repeatMode === 1) {
        playTrack(playlist.length - 1);
      }
    }

    function filterPlaylist() {
      const term = podcastSearch.value.trim().toLowerCase();

      filteredPlaylist = playlist.filter(item => {
        return (
          item.title.toLowerCase().includes(term) ||
          item.preacher.toLowerCase().includes(term) ||
          item.subtitle.toLowerCase().includes(term) ||
          formatDate(item.date).toLowerCase().includes(term)
        );
      });

      renderPlaylist();
    }

    function togglePodcastTool(force) {
      const shouldOpen = typeof force === 'boolean'
        ? force
        : podcastTool.style.display !== 'flex';

      podcastTool.style.display = shouldOpen ? 'flex' : 'none';
    }

    podcastToolBtn.addEventListener('click', () => togglePodcastTool());
    closeBtn.addEventListener('click', () => togglePodcastTool(false));
    refreshBtn.addEventListener('click', loadPlaylist);
    podcastSearch.addEventListener('input', filterPlaylist);

    showMoreTracksBtn.addEventListener('click', () => {
      togglePodcastTool(true);
    });

    playPauseBtn.addEventListener('click', () => {
      if (!audioPlayer.src) {
        if (playlist.length) playTrack(0);
        return;
      }

      if (audioPlayer.paused) {
        audioPlayer.play().catch(err => console.error(err));
      } else {
        audioPlayer.pause();
      }
    });

    nextBtn.addEventListener('click', playNext);
    prevBtn.addEventListener('click', playPrev);

    repeatBtn.addEventListener('click', () => {
      repeatMode = (repeatMode + 1) % 3;
      updateRepeatIcon();
    });

    audioPlayer.addEventListener('play', () => {
      playerStatus.textContent = 'កំពុងចាក់';
      updatePlayPauseIcon();
    });

    audioPlayer.addEventListener('pause', () => {
      playerStatus.textContent = 'បានផ្អាក';
      updatePlayPauseIcon();
    });

    audioPlayer.addEventListener('loadedmetadata', updateProgress);
    audioPlayer.addEventListener('timeupdate', updateProgress);

    audioPlayer.addEventListener('ended', () => {
      if (repeatMode === 2) {
        audioPlayer.currentTime = 0;
        audioPlayer.play();
        return;
      }

      if (repeatMode === 1) {
        const nextIndex = currentIndex < playlist.length - 1 ? currentIndex + 1 : 0;
        playTrack(nextIndex);
        return;
      }

      if (currentIndex < playlist.length - 1) {
        playTrack(currentIndex + 1);
      } else {
        playerStatus.textContent = 'ចាក់ចប់ហើយ';
        updatePlayPauseIcon();
      }
    });

    audioPlayer.addEventListener('error', () => {
      playerStatus.textContent = 'មានបញ្ហាឯកសារ MP3';
    });

    waveformWrap.addEventListener('click', e => {
      const rect = waveformWrap.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percent = Math.max(0, Math.min(1, x / rect.width));

      if (audioPlayer.duration) {
        audioPlayer.currentTime = audioPlayer.duration * percent;
      }
    });

    let popupDragging = false;
    let popupDX = 0;
    let popupDY = 0;

    podcastHeader.addEventListener('mousedown', e => {
      popupDragging = true;
      popupDX = e.clientX - podcastTool.offsetLeft;
      popupDY = e.clientY - podcastTool.offsetTop;
    });

    document.addEventListener('mousemove', e => {
      if (!popupDragging) return;
      podcastTool.style.right = 'auto';
      podcastTool.style.left = (e.clientX - popupDX) + 'px';
      podcastTool.style.top = (e.clientY - popupDY) + 'px';
    });

    document.addEventListener('mouseup', () => {
      popupDragging = false;
    });

    podcastHeader.addEventListener('touchstart', e => {
      const t = e.touches[0];
      popupDragging = true;
      popupDX = t.clientX - podcastTool.offsetLeft;
      popupDY = t.clientY - podcastTool.offsetTop;
    });

    document.addEventListener('touchmove', e => {
      if (!popupDragging) return;
      const t = e.touches[0];
      podcastTool.style.right = 'auto';
      podcastTool.style.left = (t.clientX - popupDX) + 'px';
      podcastTool.style.top = (t.clientY - popupDY) + 'px';
    });

    document.addEventListener('touchend', () => {
      popupDragging = false;
    });

    updateRepeatIcon();
    updatePlayPauseIcon();
    updateNowPlaying(null);
    updateProgress();
    loadPlaylist();
  </script>
</body>
</html>
