function startOfWeek(){const d=new Date();d.setDate(d.getDate()-d.getDay());return dateKey(d)}
function monthAdd(month,delta){const [y,m]=month.split('-').map(Number),d=new Date(y,m-1+delta,1);return dateKey(d).slice(0,7)}
function sundaysBetween(fromMonth,toMonth){const [fy,fm]=fromMonth.split('-').map(Number),[ty,tm]=toMonth.split('-').map(Number),d=new Date(fy,fm-1,1),end=new Date(ty,tm,0),arr=[];while(d<=end){if(d.getDay()===0)arr.push(dateKey(d));d.setDate(d.getDate()+1)}return arr}
function monthLabels(n=8){const a=[];let m=monthAdd(monthNow(),-(n-1));for(let i=0;i<n;i++){a.push(m);m=monthAdd(m,1)}return a}
function dashboardDates(){
  const set=new Set([startOfWeek(),...sundaysBetween(monthNow(),monthNow()),...sundaysBetween(yearNow()+'-01',yearNow()+'-12')]);
  monthLabels(8).forEach(m=>sundaysBetween(m,m).forEach(d=>set.add(d)));
  return [...set].sort();
}

async function pool(tasks,limit=READ_CONCURRENCY){let i=0;const workers=Array.from({length:Math.min(limit,tasks.length)},async()=>{while(i<tasks.length){const task=tasks[i++];await task()}});await Promise.all(workers)}
async function loadAttendanceBatches(students,dates){
  const pairs=new Set();
  students.forEach(s=>dates.forEach(date=>{if(s.classId)pairs.add(`${date}/${s.classId}`)}));
  const tasks=[...pairs].map(key=>async()=>{
    if(state.loadedKeys.has('class:'+key))return;
    const val=await read('attendance/'+key);
    state.loadedKeys.add('class:'+key);
    const [date,classId]=key.split('/');
    state.attendance[date]??={};
    state.attendance[date][classId]=val||{};
  });
  await pool(tasks,READ_CONCURRENCY);
}
async function loadAttendanceLeaves(students,dates){
  try{
    await loadAttendanceBatches(students,dates);
    return;
  }catch(e){
    console.warn('Batch attendance read failed; using leaf reads.',e.code||e.message);
    state.attendance={};
    state.loadedKeys=new Set();
  }
  const tasks=[];
  for(const s of students){
    if(!s.classId) continue;
    for(const date of dates){
      const key=`${date}/${s.classId}/${s.id}`;
      if(state.loadedKeys.has(key)) continue;
      state.loadedKeys.add(key);
      tasks.push(async()=>{try{const snap=await get(ref(db,'attendance/'+key));saveAttendance(date,s.classId,s.id,snap.val())}catch(e){console.warn('Attendance read blocked or failed:',key,e.code||e.message)}});
    }
  }
  await pool(tasks,READ_CONCURRENCY);
}
function studentStartDate(s){
  const raw=s.startDate||s.joinDate||s.joinedAt||s.enrolledAt||s.createdAt||s.created||s.dateCreated;
  if(!raw)return '';
  if(typeof raw==='number')return dateKey(new Date(raw));
  const str=String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(str))return str.slice(0,10);
  const d=new Date(str);
  return Number.isNaN(d.getTime())?'':dateKey(d);
}
function countStudent(s,dates){let total=0,present=0;const start=studentStartDate(s);for(const date of dates){if(!date||start&&date<start)continue;total++;const rec=state.attendance?.[date]?.[s.classId]?.[s.id];if(isPresent(rec))present++}return {total,present,absent:Math.max(total-present,0),rate:total?Math.round(present/total*100):0}}

function buildFilters(){let oldCh=$('churchFilter').value||localStorage.getItem(ADMIN_SELECTED_CHURCH_KEY)||'',oldCl=$('classFilter').value;const churches=allChurches();if(!canManageAll()&&!oldCh&&churches[0])oldCh=churches[0].id;$('churchFilter').innerHTML='<option value="">'+t('selectChurch')+'</option>'+churches.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');$('churchFilter').value=[...$('churchFilter').options].some(o=>o.value===oldCh)?oldCh:'';const ch=$('churchFilter').value;$('classFilter').innerHTML='<option value="">'+t('allClasses')+'</option>'+allClasses().filter(c=>ch&&c.churchId===ch).map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');if([...$('classFilter').options].some(o=>o.value===oldCl))$('classFilter').value=oldCl;syncCustomSelects()}
$('search').addEventListener('input',computeAndRender);
$('churchFilter').addEventListener('input',()=>{localStorage.setItem(ADMIN_SELECTED_CHURCH_KEY,$('churchFilter').value);$('classFilter').value='';buildFilters();computeAndRender()});
$('classFilter').addEventListener('input',computeAndRender);
$('sortBy').addEventListener('input',computeAndRender);
function makeStats(){const week=datesFor('week'),month=datesFor('month'),year=datesFor('year'),all=datesFor('all');return allStudents().map(s=>{const w=countStudent(s,week),m=countStudent(s,month),y=countStudent(s,year),l=countStudent(s,all);return {...s,week:w,month:m,year:y,life:l,rate:y.rate||l.rate}})}
function filteredStats(){const q=$('search').value.toLowerCase(),ch=$('churchFilter').value,cl=$('classFilter').value;if(canManageAll()&&!ch)return [];let arr=state.stats.filter(s=>(!ch||s.churchId===ch)&&(!cl||s.classId===cl)&&(!q||[s.name,getClass(s.classId),getChurch(s.churchId),s.gender,s.age].join(' ').toLowerCase().includes(q)));const sort=$('sortBy').value;arr.sort((a,b)=>sort==='rateAsc'?a.rate-b.rate:sort==='nameAsc'?String(a.name).localeCompare(String(b.name)):sort==='monthDesc'?b.month.present-a.month.present:sort==='yearDesc'?b.year.present-a.year.present:b.rate-a.rate);return arr}
function combine(arr,key){const t=arr.reduce((sum,s)=>sum+s[key].total,0),p=arr.reduce((sum,s)=>sum+s[key].present,0);return {t,p,rate:t?Math.round(p/t*100):0}}
function computeAndRender(){state.stats=makeStats();const arr=filteredStats(),w=combine(arr,'week'),m=combine(arr,'month');$('totalStudents').textContent=arr.length;$('weekRate').textContent=w.rate+'%';$('monthRate').textContent=m.rate+'%';$('bestStudent').textContent=(arr.slice().sort((a,b)=>b.year.rate-a.year.rate)[0]?.name||'-').slice(0,20);$('resultCount').textContent=arr.length+' students';renderStudents(arr);renderCharts(arr);localizeCards()}
function exportSnapshot(){
  const students=filteredStats();
  const week=combine(students,'week'),month=combine(students,'month'),year=combine(students,'year'),life=combine(students,'life');
  return {type:'kid-dashboard-export',version:1,generatedAt:new Date().toISOString(),language:state.lang,user:{role:state.role,name:state.userName,churchId:state.churchId},filters:{search:$('search').value,churchId:$('churchFilter').value,church:getChurch($('churchFilter').value),classId:$('classFilter').value,class:getClass($('classFilter').value),sort:$('sortBy').value},summary:{students:students.length,week,month,year,life,bestStudent:students.slice().sort((a,b)=>b.year.rate-a.year.rate)[0]?.name||''},students:students.map(s=>({id:s.id,name:s.name||'',gender:s.gender||'',age:s.age||'',churchId:s.churchId||'',church:getChurch(s.churchId),classId:s.classId||'',class:getClass(s.classId),week:s.week,month:s.month,year:s.year,range:s.life,rate:s.rate}))};
}
function downloadFile(name,type,text){const blob=new Blob([text],{type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1200)}
function exportJson(){const data=exportSnapshot();downloadFile(`kid-dashboard-${today()}.json`,'application/json;charset=utf-8',JSON.stringify(data,null,2))}
function exportPdf(){
  const data=exportSnapshot();
  const rows=data.students.map((s,i)=>`<tr><td>${i+1}</td><td>${esc(s.name)}</td><td>${esc(s.class)}</td><td>${esc(s.church)}</td><td>${s.week.present}/${s.week.total}</td><td>${s.month.present}/${s.month.total}</td><td>${s.year.present}/${s.year.total}</td><td>${s.range.present}/${s.range.total}</td><td>${s.rate}%</td></tr>`).join('');
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(t('title'))}</title><style>@font-face{font-family:Krasar;src:url('./fonts/Krasar-Regular.woff') format('woff')}body{font-family:Krasar,Arial,sans-serif;color:#0f172a;margin:28px}h1{margin:0 0 4px;font-size:26px}.meta{color:#475569;margin-bottom:18px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.box{border:1px solid #cbd5e1;border-radius:12px;padding:10px}.box span{display:block;color:#64748b;font-size:12px}.box b{font-size:22px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #e2e8f0;padding:8px;text-align:left}th{background:#eaf2ff}tr:nth-child(even){background:#f8fafc}@media print{body{margin:14mm}.no-print{display:none}}</style></head><body><h1>${esc(t('title'))}</h1><div class="meta">${esc(new Date(data.generatedAt).toLocaleString())} · ${esc(data.filters.church||t('allChurches'))} · ${esc(data.filters.class||t('allClasses'))}</div><div class="summary"><div class="box"><span>${esc(t('totalStudents'))}</span><b>${data.summary.students}</b></div><div class="box"><span>${esc(t('thisWeek'))}</span><b>${data.summary.week.rate}%</b></div><div class="box"><span>${esc(t('thisMonth'))}</span><b>${data.summary.month.rate}%</b></div><div class="box"><span>${esc(t('bestStudent'))}</span><b>${esc(data.summary.bestStudent||'-')}</b></div></div><table><thead><tr><th>#</th><th>${esc(t('students'))}</th><th>${esc(t('allClasses'))}</th><th>${esc(t('allChurches'))}</th><th>${esc(t('week'))}</th><th>${esc(t('month'))}</th><th>${esc(t('year'))}</th><th>${esc(t('loadedRange'))}</th><th>${esc(t('rate'))}</th></tr></thead><tbody>${rows}</tbody></table><script>window.onload=()=>setTimeout(()=>window.print(),250)<\/script></body></html>`;
  const frame=document.createElement('iframe');frame.style.position='fixed';frame.style.right='0';frame.style.bottom='0';frame.style.width='1px';frame.style.height='1px';frame.style.opacity='0';document.body.appendChild(frame);frame.srcdoc=html;setTimeout(()=>frame.remove(),60000);
}
function photoSources(s){let f=clean(s.photoFile||s.photo||s.image);if(!f)return [];if(/^(https?:)?\/\//i.test(f)||/^(data|blob):/i.test(f))return [f];f=f.replace(/^\.?\//,'').replace(/^\/+/, '');const base=f.startsWith('assets/img/')?'./'+f:f.startsWith('img/')?'./assets/'+f:'./assets/img/'+encodeURIComponent(f.split(/[\\/]/).pop());return /\.[a-z0-9]{2,5}$/i.test(base)?[base]:['jpg','jpeg','png','webp'].map(x=>`${base}.${x}`)}
function avatar(s){const src=photoSources(s)[0],fallback='<i class="ri-user-smile-line"></i>';return src?`<img src="${esc(src)}" onload="this.nextElementSibling.style.display='none'" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'">${fallback}`:fallback}
function renderStudents(arr){$('studentGrid').innerHTML=arr.map(s=>{const hasPhoto=photoSources(s).length>0;return `<div class="student-card"><div class="stu-head"><div class="avatar ${hasPhoto?'has-photo':''}" ${hasPhoto?`data-photo-id="${esc(s.id)}"`:''}>${avatar(s)}</div><div><div class="stu-name">${esc(s.name||'No name')}</div><div class="stu-meta">${esc(getClass(s.classId))} · ${esc(getChurch(s.churchId))}</div></div><div class="rate">${s.rate}%</div></div><div class="meter"><i style="width:${s.rate}%"></i></div><div class="card-foot"><span class="badge">Loaded range ${s.life.present}/${s.life.total}</span><span class="all-time-badge">${s.life.present}</span><button class="btn details-btn" data-id="${esc(s.id)}">Details</button></div></div>`}).join('')||'<div class="empty">No students found</div>';bindStudentActions()}
function bindStudentActions(){document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>openModal(b.dataset.id));document.querySelectorAll('[data-photo-id]').forEach(a=>a.onclick=e=>{e.stopPropagation();openPhotoPreview(a.dataset.photoId)})}
function setChartFallback(id,msg){
  const canvas=$(id),wrap=canvas?.parentElement;
  if(!wrap)return;
  wrap.querySelector('.chart-fallback')?.remove();
  if(msg)wrap.insertAdjacentHTML('beforeend',`<div class="chart-fallback">${esc(msg)}</div>`);
}
function renderCharts(arr){
  setChartFallback('monthChart','');setChartFallback('classChart','');
  if(!window.Chart){
    if(state.monthChart){state.monthChart.destroy();state.monthChart=null}
    if(state.classChart){state.classChart.destroy();state.classChart=null}
    setChartFallback('monthChart','Charts unavailable. Check internet or add local Chart.js.');
    setChartFallback('classChart','Charts unavailable. Check internet or add local Chart.js.');
    return;
  }
  const labels=monthLabels(8),data=labels.map(m=>{const ds=sundaysBetween(m,m);let t=0,p=0;arr.forEach(s=>{const c=countStudent(s,ds);t+=c.total;p+=c.present});return t?Math.round(p/t*100):0});
  if(state.monthChart)state.monthChart.destroy();
  state.monthChart=new Chart($('monthChart'),{type:'line',data:{labels,datasets:[{label:'Attendance %',data,tension:.38,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#dbeafe'}}},scales:{x:{ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}},y:{min:0,max:100,ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}}}}});
  const groups={};
  arr.forEach(s=>{groups[getClass(s.classId)]??={t:0,p:0};groups[getClass(s.classId)].t+=s.month.total;groups[getClass(s.classId)].p+=s.month.present});
  const cls=Object.entries(groups).map(([k,v])=>[k,v.t?Math.round(v.p/v.t*100):0]).slice(0,8);
  if(state.classChart)state.classChart.destroy();
  state.classChart=new Chart($('classChart'),{type:'bar',data:{labels:cls.map(x=>x[0]),datasets:[{label:'This month %',data:cls.map(x=>x[1])}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#dbeafe'}}},scales:{x:{ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}},y:{min:0,max:100,ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}}}}})
}
function openModal(id){const s=state.stats.find(x=>x.id===id);if(!s)return;const from=yearNow()+'-01',to=monthNow();$('modal').classList.remove('hidden');$('modal').innerHTML=`<div class="modal-card glass"><div class="modal-head"><div class="avatar ${photoSources(s).length?'has-photo':''}" ${photoSources(s).length?`data-photo-id="${esc(s.id)}"`:''}>${avatar(s)}</div><div><h2>${esc(s.name||'No name')}</h2><p>${esc(getClass(s.classId))} · ${esc(getChurch(s.churchId))}</p></div><button class="btn danger" id="closeModal"><i class="ri-close-line"></i></button></div><div class="detail-grid"><div class="detail-stat"><span>This Week</span><b>${s.week.present}/${s.week.total}</b></div><div class="detail-stat"><span>This Month</span><b>${s.month.present}/${s.month.total}</b></div><div class="detail-stat"><span>This Year</span><b>${s.year.present}/${s.year.total}</b></div><div class="detail-stat"><span>Year Rate</span><b>${s.year.rate}%</b></div></div><div class="range-box"><input id="fromMonth" class="input" type="month" value="${from}"><input id="toMonth" class="input" type="month" value="${to}"><button id="calcRange" class="btn green-glass-btn">Calculate</button></div><div id="rangeResult" class="detail-grid"></div><h2>Sunday Heatmap</h2><div id="heatmap" class="heatmap"></div></div>`;$('closeModal').onclick=closeModal;$('calcRange').onclick=()=>renderRange(s);bindStudentActions();renderRange(s);localizeModal()}
async function renderRange(s){const from=$('fromMonth').value||yearNow()+'-01',to=$('toMonth').value||monthNow(),days=sundaysBetween(from,to);$('calcRange').textContent=t('loading')||'Loading...';await loadAttendanceLeaves([s],days);$('calcRange').textContent=t('calculate');const c=countStudent(s,days);$('rangeResult').innerHTML=`<div class="detail-stat"><span>Total Sundays</span><b>${c.total}</b></div><div class="detail-stat"><span>Present</span><b>${c.present}</b></div><div class="detail-stat"><span>Absent</span><b>${c.absent}</b></div><div class="detail-stat"><span>Rate</span><b>${c.rate}%</b></div>`;$('heatmap').innerHTML=days.map(d=>{const yes=isPresent(state.attendance?.[d]?.[s.classId]?.[s.id]);return `<div class="day ${yes?'yes':'no'}" title="${d}">${yes?'✓':'×'}</div>`}).join('')||'<div class="empty">'+t('noSundays')+'</div>';localizeModal()}
function openPhotoPreview(id){
  const s=state.stats.find(x=>x.id===id);
  if(!s)return;
  const src=photoSources(s)[0];
  if(!src)return;
  $('photoPreview').classList.remove('hidden');
  $('photoPreview').innerHTML=`<div class="photo-preview-card"><button class="btn danger photo-close" id="closePhoto"><i class="ri-close-line"></i></button><div class="photo-preview-name">${esc(s.name||'No name')}</div><img src="${esc(src)}" alt="${esc(s.name||'Student profile')}"></div>`;
  $('closePhoto').onclick=closePhotoPreview;
}
function closePhotoPreview(){$('photoPreview').classList.add('hidden');$('photoPreview').innerHTML=''}
$('photoPreview').addEventListener('click',e=>{if(e.target.id==='photoPreview')closePhotoPreview()});
function closeModal(){$('modal').classList.add('hidden');$('modal').innerHTML=''}$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
</script>
