<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="./vendor/remixicon/remixicon.css" rel="stylesheet">
<style>
@font-face{font-family:"Krasar";src:url("./fonts/Krasar-Regular.woff") format("woff");font-weight:400;font-style:normal;font-display:swap}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:transparent;font-family:"Krasar",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:#eaf3ff}
body{padding:0}
.app-info-card{
  width:220px;
  min-height:126px;
  padding:12px 12px 11px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.24);
  background:linear-gradient(180deg,rgba(31,41,55,.92),rgba(15,23,42,.86));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 18px 42px rgba(0,0,0,.38);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.app-info-title{text-align:center;font-size:13px;font-weight:1000;margin:0;color:#f8fafc}
.app-rating-stars{display:flex;justify-content:center;gap:4px;margin-top:8px}
.app-rating-stars button{
  width:25px;
  height:25px;
  border:0;
  border-radius:999px;
  background:transparent;
  color:#94a3b8;
  display:grid;
  place-items:center;
  padding:0;
  cursor:pointer;
  line-height:1;
}
.app-rating-stars button:active{transform:scale(.94)}
.app-rating-stars button:hover{background:rgba(250,204,21,.12)}
.app-rating-stars button.filled{color:#facc15;text-shadow:0 0 10px rgba(250,204,21,.4)}
.app-rating-stars i{font-size:19px;line-height:1}
.app-rating-status{text-align:center;min-height:14px;margin-top:1px;font-size:9px;color:#bfdbfe;font-weight:800}
.app-info-developer{text-align:center;margin-top:10px;font-size:10px;color:#cbd5e1;font-weight:900}
</style>
</head>
<body>
  <section class="app-info-card" aria-label="Appinfo">
    <h1 class="app-info-title">Appinfo</h1>
    <div id="appRatingStars" class="app-rating-stars" aria-label="Rate this app"></div>
    <div id="appRatingStatus" class="app-rating-status"></div>
    <div id="appInfoDeveloper" class="app-info-developer"></div>
  </section>
<script>
(function(){
  const storageKey = "sundaySchoolAppRating";
  const baseYear = 2026;
  const stars = document.getElementById("appRatingStars");
  const status = document.getElementById("appRatingStatus");
  const developer = document.getElementById("appInfoDeveloper");
  const year = new Date().getFullYear();
  const yearText = year > baseYear ? `${baseYear} - ${year}` : `${baseYear}`;

  function rating(){
    return Math.max(1, Math.min(5, Number(localStorage.getItem(storageKey) || 5) || 5));
  }

  function render(preview){
    const value = Math.max(1, Math.min(5, Number(preview || rating()) || 5));
    stars.innerHTML = "";
    for(let i = 1; i <= 5; i++){
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.rating = String(i);
      button.className = i <= value ? "filled" : "";
      button.setAttribute("aria-label", `Rate ${i} star${i === 1 ? "" : "s"}`);
      button.innerHTML = `<i class="${i <= value ? "ri-star-fill" : "ri-star-line"}"></i>`;
      stars.appendChild(button);
    }
    status.textContent = `Rated ${value}/5`;
    developer.textContent = `Developer: THY THET © ${yearText}`;
  }

  stars.addEventListener("click", event => {
    const button = event.target.closest("[data-rating]");
    if(!button) return;
    localStorage.setItem(storageKey, button.dataset.rating);
    render(button.dataset.rating);
  });

  stars.addEventListener("pointerover", event => {
    const button = event.target.closest("[data-rating]");
    if(button) render(button.dataset.rating);
  });
  stars.addEventListener("pointerleave", () => render());

  render();
})();
</script>
</body>
</html>
