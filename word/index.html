<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <link rel="canonical" href="https://thythet.com/ListentotheWord/">
  <script>
    const target = new URL('https://thythet.com/ListentotheWord/');
    if (window.location.search) {
      target.search = window.location.search;
    }
    if (window.location.hash) {
      target.hash = window.location.hash;
    }
    window.location.replace(target.toString());
  </script>
</head>
<body>
  Redirecting to <a id="redirectLink" href="https://thythet.com/ListentotheWord/">https://thythet.com/ListentotheWord/</a>
  <script>
    document.getElementById('redirectLink').href = new URL(window.location.search + window.location.hash, 'https://thythet.com/ListentotheWord/').toString();
  </script>
</body>
</html>
